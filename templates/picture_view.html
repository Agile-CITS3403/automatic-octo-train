<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>LowResGram | {{ pic.description or 'Untitled Art' }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#101019] text-white min-h-screen flex flex-col">

  {% include 'navbar.html' %}

  <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-12">
      <div class="max-w-4xl w-full flex flex-col items-center">
          
          <!-- Image Container -->
          <div class="relative bg-[#0d1333] rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(79,70,229,0.2)] border border-white/5">
              <!-- Pixel Grid Overlay -->
              <div class="absolute inset-0 pointer-events-none z-10 opacity-10" style="background-image: linear-gradient(to right, white 1px, transparent 1px), linear-gradient(to bottom, white 1px, transparent 1px); background-size: calc(100% / 32) calc(100% / 32);"></div>
              
              <img src="{{ url_for('static', filename='uploads/' + pic.filename) }}" 
                   alt="{{ pic.description or 'Untitled Art' }}" 
                   class="w-[min(85vw,50vh)] aspect-square object-contain" 
                   style="image-rendering: pixelated; image-rendering: crisp-edges; image-rendering: -moz-crisp-edges;">
          </div>

          <!-- Content Info -->
          <div class="mt-8 w-full max-w-2xl text-center">
              <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">{{ pic.description or 'Untitled Art' }}</h1>
              <p class="text-indigo-300 font-mono text-xl mb-8">@{{ username }}</p>

              <!-- Actions -->
              <div class="flex flex-wrap justify-center gap-4">
                  <!-- Like Button -->
                  <button onclick="toggleLike(this, {{ pic.id }})" 
                          class="btn-custom flex items-center gap-3 px-8 py-4 rounded-2xl transition-all {{ 'text-rose-500 bg-rose-500/10 border-rose-500/50' if is_liked else 'text-white bg-white/5 border-white/10' }} border">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="{{ 'currentColor' if is_liked else 'none' }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                      </svg>
                      <span class="font-bold text-lg">Like</span>
                  </button>

                  <!-- Share Button -->
                  <button onclick="shareLink(this)" 
                          class="btn-custom flex items-center gap-3 px-8 py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white transition-all shadow-lg shadow-indigo-500/20">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                          <polyline points="16 6 12 2 8 6"></polyline>
                          <line x1="12" y1="2" x2="12" y2="15"></line>
                      </svg>
                      <span class="font-bold text-lg">Share</span>
                  </button>

                  <a href="{{ back_url }}" class="btn-custom flex items-center gap-3 px-8 py-4 rounded-2xl bg-white/5 hover:bg-white/10 text-slate-300 transition-all border border-white/5">
                      {{ back_label }}
                  </a>
              </div>
          </div>

      </div>
  </main>

  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-2xl transition-all opacity-0 pointer-events-none z-[100] font-bold">
      Link copied to clipboard!
  </div>

  <script src="{{ url_for('static', filename='js/likes.js') }}"></script>
  <script>
      function shareLink(btn) {
          const url = window.location.href;
          navigator.clipboard.writeText(url).then(() => {
              const toast = document.getElementById('toast');
              toast.classList.remove('opacity-0');
              toast.classList.add('opacity-100');
              
              const originalText = btn.querySelector('span').innerText;
              btn.querySelector('span').innerText = 'Copied!';
              
              setTimeout(() => {
                  toast.classList.remove('opacity-100');
                  toast.classList.add('opacity-0');
                  btn.querySelector('span').innerText = originalText;
              }, 2000);
          });
      }
  </script>
</body>
</html>
