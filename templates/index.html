<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowResGram | Draw</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .screen {
      background-color: #151c45;
      color: white;
      border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #paint-canvas {
      background-color: white;
    }
    .color-btn {
      border-color: rgba(255,255,255,0.1);
    }
    .color-btn.active {
      border-color: white;
      transform: scale(1.1);
    }
    .btn-custom-outline {
      border: 2px solid #1F2544;
      color: white;
      padding: 10px 18px;
      border-radius: 25px;
      display: inline-block;
      transition: all 0.3s;
    }
    .btn-custom-outline:hover {
      background-color: #1F2544;
      color: white;
    }
  </style>
</head>
<body>
  <div id="app" class="flex justify-center w-full min-h-screen items-center">
    
    <!-- Background logos like in front_page -->
    <img src="{{ url_for('static', filename='images/logo_image.svg') }}" width="120" height="120" class="absolute left-[10%] top-[10%] opacity-20 pointer-events-none">
    <img src="{{ url_for('static', filename='images/logo_image.svg') }}" width="120" height="120" class="absolute right-[10%] top-[15%] opacity-20 pointer-events-none">
    <img src="{{ url_for('static', filename='images/logo_image.svg') }}" width="120" height="120" class="absolute left-[15%] bottom-[10%] opacity-20 pointer-events-none">
    <img src="{{ url_for('static', filename='images/logo_image.svg') }}" width="120" height="120" class="absolute right-[15%] bottom-[15%] opacity-20 pointer-events-none">

    <!-- Main Screen -->
    <div id="screen-main" class="screen flex flex-col items-center gap-6 p-10 rounded-3xl max-w-md w-full">
      <img src="{{ url_for('static', filename='images/logo_image.svg') }}" width="80" height="80">
      <h1 class="text-5xl font-bold tracking-tighter">Pixel32</h1>
      <div class="flex flex-col gap-4 w-full">
        <button id="btn-go-draw" class="btn-custom text-xl font-bold py-4 text-center">
          Start Drawing
        </button>
        <button id="btn-go-feed" class="btn-custom-outline text-xl font-bold py-4 text-center">
          View Feed
        </button>
        <a href="{{ url_for('profile') }}" class="btn-custom-outline text-xl font-bold py-4 text-center">
          My Profile
        </a>
        <a href="{{ url_for('home') }}" class="text-center text-slate-400 hover:text-white font-medium py-2">
          Back to Home
        </a>
      </div>
    </div>

    <!-- Draw Screen -->
    <div id="screen-draw" class="screen hidden flex flex-col items-center gap-6 p-10 rounded-3xl max-w-md w-full">
      <header class="flex items-center w-full gap-4">
        <button class="btn-back bg-slate-800 hover:bg-slate-700 text-white p-3 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 class="text-3xl font-bold">Studio</h2>
      </header>

      <!-- Canvas with Grid Overlay -->
      <div class="canvas-wrapper border-4 border-slate-700 rounded-lg">
        <canvas id="paint-canvas" width="32" height="32"></canvas>
        <div class="grid-overlay"></div>
      </div>

      <div class="w-full flex flex-col gap-6">
        <!-- Color Palette -->
        <div class="flex flex-col gap-3">
          <label class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Palette</label>
          <div id="color-palette" class="grid grid-cols-8 gap-2 w-full">
            <!-- Colors will be injected via JS -->
          </div>
        </div>

        <div class="flex gap-3">
          <button id="btn-clear" class="flex-1 bg-red-900/30 hover:bg-red-900/50 text-red-400 font-bold py-3 px-4 rounded-xl transition-colors border border-red-900/50">
            Clear
          </button>
          <button id="btn-save" class="flex-[2] btn-custom font-bold py-3 px-4 rounded-xl">
            Save to Feed
          </button>
        </div>
      </div>
    </div>

    <!-- Feed Screen -->
    <div id="screen-feed" class="screen hidden flex flex-col items-center gap-6 p-10 rounded-3xl max-w-xl w-full">
      <header class="flex items-center w-full gap-4">
        <button class="btn-back bg-slate-800 hover:bg-slate-700 text-white p-3 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 class="text-3xl font-bold">Community Feed</h2>
      </header>
      <div id="feed-container" class="feed-grid grid grid-cols-3 sm:grid-cols-4 gap-4 w-full">
        <!-- Images will be injected here -->
      </div>
    </div>
  </div>
  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
