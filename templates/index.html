<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowResGram | Draw</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#101019] text-white min-h-screen flex flex-col">

  <!-- Standard App Navigation -->
  {% set active_page = 'draw' %}
  {% include 'navbar.html' %}

  <!-- Main Drawing Area -->
  <main class="flex-1 flex justify-center items-center p-4 sm:p-8">
    
    <div class="bg-[#151c45] border border-slate-800 shadow-2xl rounded-3xl p-8 md:p-12 w-full max-w-5xl flex flex-col md:flex-row gap-10 md:gap-16 items-center md:items-stretch">
      
      <!-- Left side: Canvas -->
      <div class="flex flex-col gap-4 shrink-0 items-center">
        <h2 class="text-3xl font-bold tracking-tighter text-center md:text-left w-full text-blue-100">Studio</h2>
        <div class="canvas-wrapper border-4 border-slate-700 rounded-xl overflow-hidden shadow-black/50 shadow-lg shrink-0 bg-white">
          <canvas id="paint-canvas" width="32" height="32"></canvas>
          <div class="grid-overlay"></div>
        </div>
      </div>

      <!-- Right side: Tools -->
      <div class="flex flex-col gap-8 flex-1 justify-center">
        
        <!-- Color Palette -->
        <div class="flex flex-col gap-4 bg-black/20 p-6 rounded-2xl border border-white/5">
          <label class="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg>
            Color Palette
          </label>
          <div id="color-palette" class="grid grid-cols-8 gap-3 w-full">
            <!-- Colors will be injected via JS -->
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4">
          <button id="btn-clear" class="flex-1 bg-red-950/40 hover:bg-red-900/60 text-red-300 font-bold py-4 px-6 rounded-2xl transition-all border border-red-900/50 hover:border-red-500/50 shadow-lg flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            Clear
          </button>
          <button id="btn-save" class="flex-[2] btn-custom hover:bg-blue-600 font-bold py-4 px-6 text-lg rounded-2xl shadow-lg transition-all flex justify-center items-center gap-2 border border-blue-400/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save to Feed
          </button>
        </div>

      </div>
    </div>
  </main>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
