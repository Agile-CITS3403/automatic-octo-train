<div class="bg-[#1a214d] rounded-xl overflow-hidden border border-slate-700/50 hover:border-slate-500 transition-colors group shadow-lg flex flex-col h-full relative" style="-webkit-transform: translateZ(0);">
    <a href="{{ url_for('view_picture', picture_id=pic.id) }}" class="aspect-square bg-[#0d1333] relative overflow-hidden block" style="-webkit-mask-image: -webkit-radial-gradient(white, black);">
        <img src="{{ url_for('static', filename='uploads/' + pic.filename) }}" 
             alt="{{ pic.description or 'Untitled Art' }}" 
             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 will-change-transform" 
             style="image-rendering: pixelated; -webkit-backface-visibility: hidden; -webkit-transform: translateZ(0);">
             
        <!-- Hover Hint -->
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </div>
    </a>
    
    <!-- Like Button Overlay (Needs to be outside the anchor to prevent navigation) -->
    <button onclick="toggleLike(this, {{ pic.id }})" 
            class="absolute top-3 right-3 p-2 rounded-full bg-black/40 backdrop-blur-sm border border-white/10 hover:bg-black/60 transition-all z-10 like-btn {{ 'text-rose-500' if is_liked else 'text-white' }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="{{ 'currentColor' if is_liked else 'none' }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
    </button>
    <div class="p-4 flex flex-col justify-between bg-[#151c45] flex-1" style="-webkit-transform: translateZ(0); -webkit-backface-visibility: hidden;">
        <div style="-webkit-transform: translateZ(0);">
            <h5 class="text-lg font-semibold overflow-wrap-anywhere break-words text-slate-100 line-clamp-2">
                {{ pic.description or 'Untitled Art' }}
            </h5>
            {% if username %}
            <p class="text-sm text-indigo-300 font-mono mt-1 opacity-80 group-hover:opacity-100 transition-opacity">@{{ username }}</p>
            {% endif %}
            
            {% if pic.tags %}
            <div class="flex flex-wrap gap-1 mt-2">
                {% for tag in pic.tags %}
                <span class="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-md bg-blue-900/30 text-blue-300 border border-blue-800/50">{{ tag.name }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
</div>
