<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>LowResGram | Choose Interests</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
<body class="bg-[#101019] text-white min-h-screen">

  <div class="interests-page flex justify-center items-center min-h-screen p-4">
    <div class="bg-[#151c45] border border-slate-800 shadow-2xl rounded-3xl p-8 max-w-lg w-full text-center">
      <h1 class="text-3xl font-bold mb-4">Choose your interests</h1>
      <p class="text-slate-300 mb-8">Select what you're into so LowResGram can personalise your feed.</p>

      <form method="POST" action="{{ url_for('interests') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="grid grid-cols-2 gap-4 mb-8 text-left">
          {% for interest in interest_options %}
          <label class="bg-black/20 p-4 rounded-xl border border-slate-700/50 flex items-center gap-3 cursor-pointer hover:border-slate-500 transition-colors">
            <input type="checkbox" name="interests" value="{{ interest.id }}" class="w-5 h-5 accent-blue-600 bg-slate-800 border-slate-600 rounded" {% if interest.id in selected_ids %}checked{% endif %}> 
            {{ interest.name }}
          </label>
          {% endfor %}
        </div>

        <button type="submit" class="btn-custom w-full font-bold py-4 px-6 rounded-2xl shadow-lg transition-all text-lg mb-4">Save interests</button>
      </form>

      <a href="{{ url_for('feed') }}" class="text-slate-400 hover:text-white transition-colors">Skip for now</a>
    </div>
  </div>

</body>
</html>
