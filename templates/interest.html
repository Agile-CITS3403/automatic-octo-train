<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowResGram | Choose Interests</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="interests-page">
    <div class="interests-box">
      <h1>Choose your interests</h1>
      <p>Select what you’re into so LowResGram can personalise your feed.</p>

      <form>
        <div class="interest-grid">
          <label><input type="checkbox" name="interests" value="Gaming"> Gaming</label>
          <label><input type="checkbox" name="interests" value="Memes"> Memes</label>
          <label><input type="checkbox" name="interests" value="Art"> Art</label>
          <label><input type="checkbox" name="interests" value="Food"> Food</label>
          <label><input type="checkbox" name="interests" value="Anime"> Anime</label>
        </div>

        <button type="submit" class="btn-custom mt-4">Save interests</button>
      </form>

      <a href="index.html" class="back-link">Skip for now</a>
    </div>
  </div>

</body>
</html>
