<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowResGram | Create account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>
<body>

  <div class="auth-page d-flex justify-content-center align-items-center">
    <div class="form-box p-4">
      <h2 class="mb-4 text-center">Create account</h2>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <input class="form-control custom-input mb-3" type="text" name="username" placeholder="Username" required>
        <input class="form-control custom-input mb-3" type="email" name="email" placeholder="Email" required>
        <input class="form-control custom-input mb-3" type="password" name="password" placeholder="Password" required>
        <button class="btn-custom w-100 border-0" type="submit">Create account</button>
      </form>

      <p class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
      <p class="text-center"><a href="{{ url_for('home') }}">Back to home</a></p>
    </div>
  </div>

</body>
</html>
