<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LowResGram | Create account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-page d-flex justify-content-center align-items-center">
    <div class="form-box p-4">
      <h2 class="mb-4 text-center">Create account</h2>

      <form>
        <input class="form-control custom-input mb-3" type="text" placeholder="Full Name">
        <input class="form-control custom-input mb-3" type="text" placeholder="Username">
        <input class="form-control custom-input mb-3" type="email" placeholder="Email">
        <input class="form-control custom-input mb-3" type="password" placeholder="Password">
        <button class="btn-custom w-100 border-0" type="submit">Create account</button>
      </form>

      <p class="mt-3 text-center">Already have an account? <a href="login.html">Log in</a></p>
      <p class="text-center"><a href="index.html">Back to home</a></p>
    </div>
  </div>

</body>
</html>
