<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel32 Draw</title>
  </head>
  <body class="bg-slate-50">
    <div id="app" class="flex justify-center w-full">
      <!-- Main Screen -->
      <div id="screen-main" class="screen">
        <h1 class="text-5xl font-black text-slate-800 tracking-tighter my-8">Pixel32</h1>
        <div class="flex flex-col gap-3 w-full max-w-xs">
          <button id="btn-go-draw" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-indigo-200">
            Start Drawing
          </button>
          <button id="btn-go-feed" class="bg-white hover:bg-slate-50 text-slate-700 border-2 border-slate-200 font-bold py-4 px-6 rounded-xl transition-all">
            View Feed
          </button>
        </div>
      </div>

      <!-- Draw Screen -->
      <div id="screen-draw" class="screen hidden">
        <header class="flex items-center w-full gap-4 mb-2">
          <button class="btn-back bg-slate-100 hover:bg-slate-200 text-slate-600 p-3 rounded-lg transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <h2 class="text-2xl font-bold text-slate-800">Drawing Studio</h2>
        </header>

        <!-- Canvas with Grid Overlay -->
        <div class="canvas-wrapper">
          <canvas id="paint-canvas" width="32" height="32"></canvas>
          <div class="grid-overlay"></div>
        </div>

        <div class="w-full flex flex-col gap-6">
          <!-- Color Palette -->
          <div class="flex flex-col gap-3">
            <label class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Palette</label>
            <div id="color-palette" class="grid grid-cols-8 gap-2 w-full max-w-sm">
              <!-- Colors will be injected via JS -->
            </div>
          </div>

          <div class="flex gap-3">
            <button id="btn-clear" class="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-3 px-4 rounded-xl transition-colors border border-rose-100">
              Clear
            </button>
            <button id="btn-save" class="flex-[2] bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-emerald-200">
              Save to Feed
            </button>
          </div>
        </div>
      </div>

      <!-- Feed Screen -->
      <div id="screen-feed" class="screen hidden">
        <header class="flex items-center w-full gap-4 mb-6">
          <button class="btn-back bg-slate-100 hover:bg-slate-200 text-slate-600 p-3 rounded-lg transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <h2 class="text-2xl font-bold text-slate-800">Community Feed</h2>
        </header>
        <div id="feed-container" class="feed-grid grid grid-cols-3 sm:grid-cols-4 gap-4 w-full">
          <!-- Images will be injected here -->
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
